<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}vtinker{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
          },
          animation: {
            'pulse-slow': 'pulse 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
            'slide-in-right': 'slideInRight 0.3s ease-out forwards',
            'progress-stripe': 'progressStripe 1s linear infinite',
            'glow': 'glow 2s ease-in-out infinite alternate',
            'scanline': 'scanline 8s linear infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(12px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            slideInRight: {
              '0%': { opacity: '0', transform: 'translateX(-8px)' },
              '100%': { opacity: '1', transform: 'translateX(0)' },
            },
            progressStripe: {
              '0%': { backgroundPosition: '1rem 0' },
              '100%': { backgroundPosition: '0 0' },
            },
            glow: {
              '0%': { boxShadow: '0 0 5px rgba(16, 185, 129, 0.2)' },
              '100%': { boxShadow: '0 0 20px rgba(16, 185, 129, 0.4)' },
            },
            scanline: {
              '0%': { transform: 'translateY(-100%)' },
              '100%': { transform: 'translateY(100%)' },
            },
          },
        },
      },
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }

    /* Progress bar animated stripes */
    .progress-stripe {
      background-image: linear-gradient(
        45deg,
        rgba(255,255,255,0.1) 25%,
        transparent 25%,
        transparent 50%,
        rgba(255,255,255,0.1) 50%,
        rgba(255,255,255,0.1) 75%,
        transparent 75%,
        transparent
      );
      background-size: 1rem 1rem;
    }

    /* Terminal scanline overlay */
    .terminal-scanline::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(16,185,129,0.08), transparent);
      animation: scanline 8s linear infinite;
      pointer-events: none;
    }

    /* Glow effect on hover */
    .card-glow {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card-glow:hover {
      transform: translateY(-2px) scale(1.005);
      box-shadow: 0 0 0 1px rgba(16,185,129,0.15), 0 8px 25px -5px rgba(0,0,0,0.4);
      border-color: rgba(16,185,129,0.3);
    }

    /* Smooth page transitions */
    [x-cloak] { display: none !important; }

    /* Noise texture overlay */
    .noise-bg::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0.015;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased noise-bg min-h-screen">

  <!-- Top Navigation -->
  <nav class="sticky top-0 z-50 border-b border-slate-800/80 bg-slate-950/80 backdrop-blur-xl">
    <div class="max-w-screen-2xl mx-auto px-6">
      <div class="flex items-center justify-between h-14">
        <!-- Logo & Nav -->
        <div class="flex items-center gap-8">
          <a href="/" class="flex items-center gap-2.5 group">
            <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-emerald-500 to-emerald-600 flex items-center justify-center shadow-lg shadow-emerald-500/20 group-hover:shadow-emerald-500/40 transition-shadow duration-300">
              <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </div>
            <span class="text-base font-semibold tracking-tight text-slate-100">vtinker</span>
            <span class="text-[10px] font-medium text-slate-500 bg-slate-800 px-1.5 py-0.5 rounded-md border border-slate-700/50">LOCAL</span>
          </a>

          <div class="hidden md:flex items-center gap-1">
            {% set nav_items = [
              ('/', 'Dashboard', 'dashboard'),
              ('/runs/new', 'New Run', 'new_run'),
            ] %}
            {% for href, label, page_id in nav_items %}
            <a href="{{ href }}"
               class="px-3 py-1.5 text-sm rounded-lg transition-all duration-200
                      {% if active_page == page_id %}
                        text-slate-100 bg-slate-800
                      {% else %}
                        text-slate-400 hover:text-slate-200 hover:bg-slate-800/50
                      {% endif %}">
              {{ label }}
            </a>
            {% endfor %}
          </div>
        </div>

        <!-- Right side -->
        <div class="flex items-center gap-3">
          <div class="hidden sm:flex items-center gap-2 text-xs text-slate-500 bg-slate-900 border border-slate-800 rounded-lg px-3 py-1.5">
            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse-slow"></div>
            <span class="font-mono">localhost:8420</span>
          </div>
          <button class="p-2 text-slate-400 hover:text-slate-200 hover:bg-slate-800 rounded-lg transition-colors duration-200">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="relative z-10 max-w-screen-2xl mx-auto px-6 py-6">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
